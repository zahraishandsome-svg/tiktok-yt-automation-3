# TikTok to YouTube Channel Pairs

channels:
  - id: channel_5
    tiktok_username: "haileyallissiaa"
    youtube_channel_name: "Hailey Allissia"
    google_credentials_file: "credentials/channel_5_client_secret.json"
    oauth_token_file: "tokens/channel_5_token.json"
    videos_per_day: 2
    description_footer: ""
    default_tags:
      - haileyallissia
      - viral
      - trending
    youtube_category_id: "22"
    enabled: true
    max_retry_days: 7
    shorts_max_seconds: 180
    upload_mode: tiered_split
    # Slot 1 (Short) = fresh newest TikTok. Slot 2 (Longform) = a video ≥15 days old
    # (may reuse an old short as a 4:3 longform, but NEVER the same-day video).
    min_backlog_for_slot1: 1
    longform_min_age_days: 15
    longform_min_seconds: 60
    max_download_candidates: 8
    slot_publish_times_utc:
      1: "15:00"
      2: "17:00"
